spring:
  cloud:
    config:
      enabled: false
  config:
    import: ""

  datasource:
    url: jdbc:tc:postgresql:16-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        default_schema: queue_schema
    open-in-view: false

  flyway:
    enabled: false

  kafka:
    consumer:
      group-id: test-group
    listener:
      auto-startup: false
      missing-topics-fatal: false

eureka:
  client:
    enabled: false

# Outbox 스케줄러 비활성 (운영과 일관)
common:
  messaging:
    scheduler:
      enabled: false

kafka:
  topics:
    program-created: program.created
    program-time-updated: program.time.updated
    program-cancelled: program.cancelled

queue:
  token:
    waiting-ttl: PT30M
    admission-batch-size: 100

  jwt:
    secret: "test-secret-key-for-jwt-issuance-must-be-at-least-256-bit"
    entry-token-ttl: PT3M

