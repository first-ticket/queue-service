services:
  queue-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_USER: ${GITHUB_USER}
      secrets:
        - github_token
    image: queue-service:latest
    container_name: queue-service
    ports:
      - "8085:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      CONFIG_SERVER_URL: ${CONFIG_SERVER_URL:-http://config-server:8080}
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    networks:
      - first-ticket-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    restart: unless-stopped

secrets:
  github_token:
    environment: GITHUB_TOKEN

networks:
  first-ticket-network:
    external: true
    name: first-ticket-network
